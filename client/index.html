<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spinforge</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/nes.css@2.3.0/css/nes-core.min.css" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #0a0a0a;
      font-family: 'Press Start 2P', cursive;
      color: #fff;
      font-size: 10px;
    }

    /* ── Full-screen canvas ── */
    #wheel-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ── Title Screen ── */
    #title-screen {
      position: fixed; inset: 0; z-index: 30;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.92);
      gap: 24px;
    }
    #title-screen.hidden { display: none; }
    #title-screen h1 {
      font-size: 28px; color: #f7d51d;
      text-shadow: 0 0 20px rgba(247,213,29,0.4);
      letter-spacing: 4px;
    }
    #title-screen .subtitle {
      font-size: 8px; color: #888;
      letter-spacing: 2px;
    }
    #title-screen .menu-btns {
      display: flex; flex-direction: column;
      gap: 12px; margin-top: 16px;
    }

    /* ── HUD Top-Left ── */
    #hud-left {
      position: fixed; top: 16px; left: 20px; z-index: 10;
      display: flex; flex-direction: column; gap: 6px;
    }
    #hud-left .score-line {
      font-size: 16px; color: #f7d51d;
    }
    #hud-left .round-line {
      font-size: 9px; color: #92cc41;
    }

    /* ── HUD Top-Right ── */
    #hud-right {
      position: fixed; top: 16px; right: 20px; z-index: 10;
      display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
    }
    #hud-right .balls-line {
      font-size: 12px; letter-spacing: 4px;
    }
    #hud-right .quota-line {
      font-size: 9px; color: #888;
    }

    /* ── Win notification (top center) ── */
    #win-notif {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 10; font-size: 12px; color: #e76e55;
      text-align: center;
      opacity: 0; transition: opacity 0.3s;
      text-shadow: 0 0 8px #e76e55;
    }
    #win-notif.active { opacity: 1; }

    /* ── Bottom bar ── */
    #bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; justify-content: center; align-items: center;
      padding: 12px 20px;
      background: rgba(0,0,0,0.8);
      border-top: 4px solid #222;
      z-index: 10;
      gap: 16px;
    }
    .hint {
      color: #555; font-size: 8px;
      animation: blink 1.2s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Mod Slots (circular around wheel) ── */
    #mod-slots {
      position: fixed; z-index: 5;
      pointer-events: none;
    }
    .mod-slot {
      position: absolute;
      width: 44px; height: 44px;
      border: 3px solid #333;
      border-radius: 4px;
      background: rgba(10,10,10,0.85);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      transition: border-color 0.2s, transform 0.15s;
      pointer-events: auto;
      cursor: default;
      transform: translate(-50%, -50%);
    }
    .mod-slot.locked {
      border-color: #1a1a1a;
      background: rgba(5,5,5,0.9);
      color: #222;
      font-size: 12px;
    }
    .mod-slot.empty {
      border-color: #444;
      color: #333;
      font-size: 16px;
      border-style: dashed;
    }
    .mod-slot.active {
      border-color: #f7d51d;
      cursor: pointer;
    }
    .mod-slot.active:hover {
      transform: translate(-50%, -50%) scale(1.15);
      border-color: #fff;
    }
    .mod-slot .slot-label {
      position: absolute; bottom: -14px; left: 50%;
      transform: translateX(-50%);
      font-size: 5px; color: #888;
      white-space: nowrap;
    }
    .mod-slot.active .slot-label { color: #f7d51d; }

    /* ── Overlay ── */
    #overlay {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 20; gap: 12px; padding: 20px;
    }
    #overlay.active { display: flex; }
    #overlay h2 { font-size: 16px; color: #92cc41; margin-bottom: 8px; }
    #overlay h2.fail { color: #e76e55; }
    #overlay h2.gold { color: #f7d51d; }

    /* ── Cards ── */
    .card-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .game-card {
      width: 140px; padding: 12px 8px; text-align: center;
      cursor: pointer; transition: transform 0.1s;
      font-size: 8px; background: #111; color: #fff;
    }
    .game-card:hover { transform: translateY(-6px); }
    .game-card .emoji { font-size: 28px; margin-bottom: 6px; }
    .game-card .name { color: #f7d51d; font-size: 9px; margin-bottom: 4px; }
    .game-card .desc { color: #888; line-height: 1.6; }
    .game-card .cost { color: #92cc41; font-size: 10px; margin-top: 8px; }
    .game-card.locked { opacity: 0.35; cursor: default; }
    .game-card.locked:hover { transform: none; }

    /* ── Results ── */
    .result-row {
      display: flex; gap: 12px; align-items: center;
      font-size: 10px; animation: slideIn 0.3s ease-out;
    }
    .result-row .emoji { font-size: 18px; }
    .result-row .val { color: #f7d51d; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .summary { font-size: 11px; margin-top: 8px; color: #92cc41; }
    .summary .gold { color: #f7d51d; }

    /* ── Popups ── */
    .pop {
      position: fixed; font-size: 18px; font-weight: bold;
      color: #f7d51d; pointer-events: none; z-index: 30;
      animation: popUp 1.5s ease-out forwards;
    }
    @keyframes popUp {
      0% { opacity: 0; transform: scale(0.5) translateY(0); }
      15% { opacity: 1; transform: scale(1.2) translateY(-10px); }
      100% { opacity: 0; transform: scale(0.8) translateY(-100px); }
    }
  </style>
</head>
<body>
  <canvas id="wheel-canvas"></canvas>

  <!-- Title Screen -->
  <div id="title-screen">
    <h1>🎰 SPINFORGE</h1>
    <p class="subtitle">MYSTIC ROULETTE ROGUELIKE</p>
    <div class="menu-btns">
      <button id="btn-start" class="nes-btn is-primary" style="font-size:12px; padding: 12px 32px">
        NEW RUN
      </button>
      <button id="btn-continue" class="nes-btn" style="font-size:10px; padding: 8px 24px" disabled>
        CONTINUE
      </button>
    </div>
    <p class="subtitle" style="margin-top:24px">⭐ STARS: <span id="title-stars">0</span></p>
    <p class="subtitle">BEST ROUND: <span id="title-best">0</span></p>
  </div>

  <!-- HUD -->
  <div id="hud-left" style="display:none">
    <div class="score-line">SCORE: <span id="hud-score">0</span></div>
    <div class="round-line">ROUND <span id="hud-round">1/12</span></div>
  </div>
  <div id="hud-right" style="display:none">
    <div class="balls-line" id="hud-balls"></div>
    <div class="quota-line">QUOTA <span id="hud-quota">80</span></div>
  </div>
  <div id="win-notif"></div>

  <!-- Mod Slots (positioned by JS) -->
  <div id="mod-slots"></div>

  <!-- Bottom -->
  <div id="bottom-bar" style="display:none">
    <button id="btn-action" class="nes-btn is-primary" style="font-size:10px">SPIN</button>
    <span class="hint" id="hint-text"></span>
  </div>

  <!-- Overlay -->
  <div id="overlay"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
